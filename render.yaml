services:
  - type: web
    name: maidshowcase-api
    runtime: go
    rootDir: backend
    plan: free
    buildCommand: go build -o bin/api ./cmd/api
    startCommand: ./bin/api
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRY_MINS
        value: "60"
      - key: ADMIN_EMAIL
        value: admin@maidshowcase.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
